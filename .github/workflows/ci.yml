name: 🧪 CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend Checks ───────────────────────────────────────
  frontend-lint-and-build:
    name: 🎨 Frontend - Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./midhunamasala

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: midhunamasala/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🔨 Build Next.js
        run: npm run build
        env:
          # Backend API URL (Railway)
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # Cloudinary
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          # Firebase (frontend - these are public keys, safe in secrets for CI builds)
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

  # ─── Backend Checks ────────────────────────────────────────
  backend-lint-and-build:
    name: ⚙️ Backend - Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./midhunamasala/backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: midhunamasala/backend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔨 Build TypeScript
        run: npm run build

  # ─── Security Audit ────────────────────────────────────────
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔍 Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: ./midhunamasala
        continue-on-error: true

      - name: 🔍 Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: ./midhunamasala/backend
        continue-on-error: true
